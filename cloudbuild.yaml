steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fastapi-app:$COMMIT_SHA
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fastapi-app:$COMMIT_SHA

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fastapi-app
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fastapi-app:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/fastapi-app:$COMMIT_SHA
